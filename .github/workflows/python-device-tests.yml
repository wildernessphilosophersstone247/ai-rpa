name: Python Device Tests

on:
  workflow_dispatch:

jobs:
  device-smoke:
    runs-on: self-hosted
    timeout-minutes: 20
    env:
      AIVANE_E2E_URL: ${{ vars.AIVANE_E2E_URL }}
      AIVANE_E2E_ADB_SERIAL: ${{ vars.AIVANE_E2E_ADB_SERIAL }}
      AIVANE_E2E_SKIP_ADB_PREP: ${{ vars.AIVANE_E2E_SKIP_ADB_PREP }}
      AIVANE_E2E_ENABLE_MUTATIONS: ${{ vars.AIVANE_E2E_ENABLE_MUTATIONS }}
      AIVANE_E2E_ENABLE_SCREENSHOT: ${{ vars.AIVANE_E2E_ENABLE_SCREENSHOT }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: python -m pip install --upgrade pip pytest

      - name: Verify adb is available
        run: adb devices

      - name: Run device smoke tests
        run: python -m pytest -m device -rs
