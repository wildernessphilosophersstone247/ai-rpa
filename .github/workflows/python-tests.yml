name: Python Tests

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  clients-python:
    name: clients/python (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: python -m pip install --upgrade pip pytest

      - name: Compile Python sources
        run: python -m compileall clients/python

      - name: Run non-device tests
        run: python -m pytest -m "not device"
